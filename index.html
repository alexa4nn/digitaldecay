  <script>
    function loadFromHash() {
      let hashPath = location.hash.replace("#", "");
      if (!hashPath) {
        document.querySelector('iframe[name="mainFrame"]').src = "home.html";
        document.querySelector('iframe[name="readingsFrame"]').src = "readings-home.html";
        return;
      }
      document.querySelector('iframe[name="mainFrame"]').src = hashPath;
      // `weeks/syllabus.html` has no matching `readings/syllabus.html`,
      // so keep the right column consistent with the homepage.
      let readingsPath = hashPath === "weeks/syllabus.html"
        ? "readings-home.html"
        : hashPath.replace("weeks/", "readings/");
      document.querySelector('iframe[name="readingsFrame"]').src = readingsPath;
    }
    window.addEventListener("hashchange", loadFromHash);
    window.addEventListener("DOMContentLoaded", loadFromHash);
  </script>
